apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  # replica set labels
  labels:
    purpose: deployment-demo
    project: roboshop
    app: nginx
spec:
  replicas: 3
  #These are the labels set used to create pod replicas., this should match pod labels
  selector:
    matchLabels:
      purpose:  deployment-demo
      project: roboshop
      app: nginx
  template: 
    matchLabels:
      purpose:  deployment-demo
      project: roboshop
      app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:stable-pearl