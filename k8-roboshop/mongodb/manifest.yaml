apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  # replica set labels
  labels:
    component: mongodb
    project: roboshop
    tier: database
spec:
  replicas: 1
  #These are the labels set used to create pod replicas., this should match pod labels
  selector:
    matchLabels:
      component: mongodb
      project: roboshop
      tier: database
  template: 
    metadata:
      labels:
        component: mongodb
        project: roboshop
        tier: database
    spec:
      containers:
      - name: mongodb
        image: joindevops/mongodb:v1

----
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    component: mongodb
    project: roboshop
    tier: database
spec:
  selector:
    component: mongodb
    project: roboshop
    tier: database
  ports:
  - protocol: TCP
    port: 27017 # servcie port
    targetPort: 27107 # container port
